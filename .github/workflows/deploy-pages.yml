# Deploy only Vite's dist/. Do not add a Jekyll/static workflow with path: '.' — it will
# overwrite this site and the live page will show /src/main.jsx again.
name: Deploy to GitHub Pages

on:
  push:
    # Add your default branch name here if it is not main or master.
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Ensure we deploy the Vite bundle (not dev index.html)
        run: |
          if grep -qE 'src/main\.(jsx|tsx|js|ts)' dist/index.html; then
            echo 'dist/index.html still references /src/* — check vite build and workflow path.'
            exit 1
          fi
          echo '--- dist/index.html (first 25 lines) ---'
          sed -n '1,25p' dist/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
